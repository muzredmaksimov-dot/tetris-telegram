<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tetris</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui;
        }
        .game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 8px;
        }
        canvas {
            display: block;
            width: 250px;
            height: 500px;
            border-radius: 12px;
            background: #0f0f23;
        }
        .info {
            display: flex;
            gap: 24px;
            background: #16213e;
            padding: 6px 20px;
            border-radius: 30px;
        }
        .info span {
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        .info div {
            font-size: 11px;
            color: #aaa;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            font-size: 20px;
            padding: 6px 14px;
            margin: 3px;
            border-radius: 40px;
            min-width: 55px;
        }
        .new-btn {
            background: #e94560;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="game">
    <canvas id="canvas" width="250" height="500"></canvas>
    <div class="info">
        <div><div>СЧЁТ</div><span id="score">0</span></div>
        <div><div>РЕКОРД</div><span id="high">0</span></div>
    </div>
    <div>
        <button id="left">◀</button>
        <button id="right">▶</button>
        <button id="down">▼</button>
        <button id="rotate">🔄</button>
        <button id="reset" class="new-btn">НОВАЯ</button>
    </div>
</div>
<script>
    const tg = Telegram.WebApp;
    tg.expand();
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const COLS = 10;
    const ROWS = 20;
    const SIZE = 25; // 250 / 10 = 25px
    
    const SHAPES = [
        { m: [[1,1,1,1]], c: '#00e5f0' },
        { m: [[1,1],[1,1]], c: '#f7e476' },
        { m: [[0,1,0],[1,1,1]], c: '#c084fc' },
        { m: [[0,1,1],[1,1,0]], c: '#6eeb83' },
        { m: [[1,1,0],[0,1,1]], c: '#fc6e6e' },
        { m: [[1,0,0],[1,1,1]], c: '#fca56e' },
        { m: [[0,0,1],[1,1,1]], c: '#6eaefc' }
    ];
    
    let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
    let piece = null;
    let score = 0;
    let high = 0;
    let gameOver = false;
    let interval = null;
    
    const STORAGE_KEY = 'tetris_high';
    
    tg.CloudStorage.getItem(STORAGE_KEY, (err, val) => {
        if(!err && val) high = parseInt(val);
        document.getElementById('high').innerText = high;
    });
    
    function saveHigh() {
        if(score > high) {
            high = score;
            document.getElementById('high').innerText = high;
            tg.CloudStorage.setItem(STORAGE_KEY, high.toString());
        }
    }
    
    function randomPiece() {
        const idx = Math.floor(Math.random() * SHAPES.length);
        const s = SHAPES[idx];
        return {
            m: s.m.map(row => [...row]),
            c: s.c,
            x: Math.floor((COLS - s.m[0].length) / 2),
            y: 0
        };
    }
    
    function collide(p, offX, offY) {
        for(let i=0; i<p.m.length; i++) {
            for(let j=0; j<p.m[0].length; j++) {
                if(p.m[i][j]) {
                    const nx = p.x + j + offX;
                    const ny = p.y + i + offY;
                    if(nx < 0 || nx >= COLS || ny >= ROWS) return true;
                    if(ny >= 0 && board[ny][nx] !== 0) return true;
                }
            }
        }
        return false;
    }
    
    function merge() {
        for(let i=0; i<piece.m.length; i++) {
            for(let j=0; j<piece.m[0].length; j++) {
                if(piece.m[i][j]) {
                    const x = piece.x + j;
                    const y = piece.y + i;
                    if(y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                        board[y][x] = piece.c;
                    }
                }
            }
        }
        clearLines();
        spawn();
    }
    
    function clearLines() {
        let cleared = 0;
        for(let row = ROWS-1; row >= 0; ) {
            let full = true;
            for(let col = 0; col < COLS; col++) {
                if(board[row][col] === 0) {
                    full = false;
                    break;
                }
            }
            if(full) {
                for(let r = row; r > 0; r--) {
                    board[r] = [...board[r-1]];
                }
                board[0] = Array(COLS).fill(0);
                cleared++;
            } else {
                row--;
            }
        }
        if(cleared > 0) {
            const addScore = cleared === 1 ? 100 : cleared === 2 ? 300 : cleared === 3 ? 600 : 1000;
            score += addScore;
            document.getElementById('score').innerText = score;
            saveHigh();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
    }
    
    function spawn() {
        piece = randomPiece();
        if(collide(piece, 0, 0)) {
            gameOver = true;
            if(interval) clearInterval(interval);
            interval = null;
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            tg.showAlert('Game Over! Счёт: ' + score);
        }
        draw();
    }
    
    function move(dx, dy) {
        if(gameOver || !piece) return false;
        if(!collide(piece, dx, dy)) {
            piece.x += dx;
            piece.y += dy;
            draw();
            return true;
        }
        if(dy === 1) {
            merge();
            draw();
        }
        return false;
    }
    
    function rotatePiece() {
        if(gameOver || !piece) return;
        const oldM = piece.m;
        const rotated = oldM[0].map((_, idx) => oldM.map(row => row[idx]).reverse());
        piece.m = rotated;
        let offset = 0;
        while(collide(piece, 0, 0)) {
            piece.x += (offset === 0 ? -1 : 1);
            if(Math.abs(offset) > 3) {
                piece.m = oldM;
                piece.x -= (offset === 0 ? -1 : 1);
                break;
            }
            offset++;
        }
        draw();
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('soft');
    }
    
    function resetGame() {
        if(interval) clearInterval(interval);
        board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        score = 0;
        gameOver = false;
        document.getElementById('score').innerText = '0';
        spawn();
        interval = setInterval(() => {
            if(!gameOver && piece) {
                move(0, 1);
            }
        }, 450);
        draw();
    }
    
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Отрисовка поля
        for(let row = 0; row < ROWS; row++) {
            for(let col = 0; col < COLS; col++) {
                if(board[row][col] !== 0) {
                    ctx.fillStyle = board[row][col];
                    ctx.fillRect(col * SIZE, row * SIZE, SIZE - 0.5, SIZE - 0.5);
                } else {
                    ctx.fillStyle = '#1f1f3a';
                    ctx.fillRect(col * SIZE, row * SIZE, SIZE - 0.5, SIZE - 0.5);
                }
            }
        }
        
        // Отрисовка текущей фигуры
        if(piece && !gameOver) {
            for(let row = 0; row < piece.m.length; row++) {
                for(let col = 0; col < piece.m[0].length; col++) {
                    if(piece.m[row][col]) {
                        ctx.fillStyle = piece.c;
                        ctx.fillRect((piece.x + col) * SIZE, (piece.y + row) * SIZE, SIZE - 0.5, SIZE - 0.5);
                    }
                }
            }
        }
        
        // Сетка
        ctx.beginPath();
        ctx.strokeStyle = '#3d3d6b';
        ctx.lineWidth = 0.5;
        for(let i = 0; i <= COLS; i++) {
            ctx.moveTo(i * SIZE, 0);
            ctx.lineTo(i * SIZE, canvas.height);
            ctx.stroke();
            ctx.moveTo(0, i * SIZE);
            ctx.lineTo(canvas.width, i * SIZE);
            ctx.stroke();
        }
    }
    
    // Управление
    document.getElementById('left').onclick = () => move(-1, 0);
    document.getElementById('right').onclick = () => move(1, 0);
    document.getElementById('down').onclick = () => move(0, 1);
    document.getElementById('rotate').onclick = () => rotatePiece();
    document.getElementById('reset').onclick = () => resetGame();
    
    canvas.ontouchstart = (e) => {
        e.preventDefault();
        rotatePiece();
    };
    
    // Клавиатура для ПК
    window.onkeydown = (e) => {
        if(e.key === 'ArrowLeft') move(-1, 0);
        else if(e.key === 'ArrowRight') move(1, 0);
        else if(e.key === 'ArrowDown') move(0, 1);
        else if(e.key === 'ArrowUp') rotatePiece();
        else if(e.key === ' ' || e.key === 'Space') {
            if(!gameOver && piece) {
                while(!collide(piece, 0, 1)) piece.y++;
                merge();
                draw();
            }
            e.preventDefault();
        }
        else if(e.key === 'r' || e.key === 'R') resetGame();
    };
    
    // Запуск игры
    resetGame();
</script>
</body>
</html>
