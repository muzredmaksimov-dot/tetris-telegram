<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тетрис — Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            touch-action: manipulation;
            padding: 10px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            height: 98vh;
            max-width: 550px;
            margin: 0 auto;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ — УМЕНЬШЕННАЯ */
        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            width: 100%;
            flex-shrink: 0;
        }

        .highscore-box {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            padding: 5px 12px;
            border-radius: 40px;
            text-align: center;
            flex: 0 1 auto;
            min-width: 80px;
        }

        .highscore-label {
            font-size: 9px;
            color: var(--tg-theme-hint-color, #aaa);
        }

        .highscore-value {
            font-size: 16px;
            font-weight: 800;
            color: var(--tg-theme-text-color, #fff);
            line-height: 1.2;
        }

        .top-btn {
            background: var(--tg-theme-button-color, #2c3e66);
            border: none;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            transition: all 0.03s linear;
            white-space: nowrap;
        }

        .new-game-btn {
            background: #e94560;
        }

        .top-btn:active {
            transform: translateY(1px);
            box-shadow: none;
        }

        /* ИГРОВОЕ ПОЛЕ */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            min-height: 0;
        }

        #boardCanvas {
            display: block;
            width: auto;
            height: 100%;
            max-height: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background-color: #0a0a1a;
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-panel {
            width: 100%;
            flex-shrink: 0;
        }

        .score-box {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            padding: 5px 12px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 12px;
        }

        .score-label {
            font-size: 9px;
            color: var(--tg-theme-hint-color, #aaa);
        }

        .score-value {
            font-size: 16px;
            font-weight: 800;
            color: var(--tg-theme-text-color, #fff);
        }

        /* КНОПКИ УПРАВЛЕНИЯ — БОЛЬШИЕ */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: var(--tg-theme-button-color, #2c3e66);
            border: none;
            color: white;
            font-size: 36px;
            font-weight: bold;
            padding: 16px 0;
            width: 110px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: all 0.03s linear;
            text-align: center;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* АДАПТАЦИЯ ДЛЯ НЕБОЛЬШИХ ЭКРАНОВ */
        @media (max-width: 500px) {
            .ctrl-btn {
                width: 90px;
                font-size: 32px;
                padding: 14px 0;
            }
            .controls {
                gap: 15px;
            }
        }

        @media (max-width: 420px) {
            .ctrl-btn {
                width: 75px;
                font-size: 28px;
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- Верхняя панель: рекорд + пауза + новая (уменьшенные) -->
    <div class="top-panel">
        <div class="highscore-box">
            <div class="highscore-label">РЕКОРД</div>
            <div class="highscore-value" id="highScoreDisplay">0</div>
        </div>
        <button class="top-btn pause-btn" id="pauseBtn">⏸ ПАУЗА</button>
        <button class="top-btn new-game-btn" id="newGameBtn">🔄 НОВАЯ</button>
    </div>

    <!-- Игровое поле -->
    <div class="canvas-wrapper">
        <canvas id="boardCanvas"></canvas>
    </div>

    <!-- Нижняя панель: счёт + большие кнопки -->
    <div class="bottom-panel">
        <div class="score-box">
            <div class="score-label">СЧЁТ</div>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="leftBtn">◀</button>
            <button class="ctrl-btn" id="rightBtn">▶</button>
            <button class="ctrl-btn" id="downBtn">▼</button>
        </div>
    </div>
</div>

<script>
    (function(){
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // ========== ТЕТРИС ==========
        const COLS = 10, ROWS = 20;
        let canvas = document.getElementById('boardCanvas'), ctx = canvas.getContext('2d');
        let blockSize = 0, board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let currentPiece = null, gameLoop = null, gameOver = false, paused = false, score = 0, high = 0;
        const BASE_INTERVAL = 450, STORAGE_KEY = 'tetris_high';
        const scoreSpan = document.getElementById('scoreDisplay'), highSpan = document.getElementById('highScoreDisplay');
        const pauseBtn = document.getElementById('pauseBtn');
        
        const SHAPES = [
            { m: [[1,1,1,1]], c: '#00e5f0' },
            { m: [[1,1],[1,1]], c: '#f7e476' },
            { m: [[0,1,0],[1,1,1]], c: '#c084fc' },
            { m: [[0,1,1],[1,1,0]], c: '#6eeb83' },
            { m: [[1,1,0],[0,1,1]], c: '#fc6e6e' },
            { m: [[1,0,0],[1,1,1]], c: '#fca56e' },
            { m: [[0,0,1],[1,1,1]], c: '#6eaefc' }
        ];
        
        function resizeCanvas() {
            let w = canvas.parentElement.clientWidth, h = canvas.parentElement.clientHeight;
            let idealW = h / 2;
            if (idealW <= w) { canvas.width = idealW; canvas.height = h; }
            else { canvas.width = w; canvas.height = w * 2; }
            canvas.style.width = canvas.width + 'px'; canvas.style.height = canvas.height + 'px';
            blockSize = canvas.width / COLS;
            draw();
        }
        
        window.addEventListener('resize', () => setTimeout(resizeCanvas, 10));
        window.addEventListener('load', () => setTimeout(resizeCanvas, 50));
        
        function togglePause() { 
            if (!gameOver) { 
                paused = !paused; 
                pauseBtn.innerText = paused ? "▶ ИГРАТЬ" : "⏸ ПАУЗА"; 
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); 
                draw(); 
            } 
        }
        
        function loadHigh() { 
            tg.CloudStorage.getItem(STORAGE_KEY, (_, val) => { 
                high = (!val || isNaN(val)) ? 0 : parseInt(val); 
                highSpan.innerText = high; 
            }); 
        }
        
        function saveHigh() { 
            if(score > high) { 
                high = score; 
                highSpan.innerText = high; 
                tg.CloudStorage.setItem(STORAGE_KEY, high.toString()); 
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); 
            } 
        }
        
        function randomPiece() { 
            let idx = Math.floor(Math.random()*SHAPES.length), s = SHAPES[idx]; 
            return { m: s.m.map(r=>[...r]), c: s.c, x: Math.floor((COLS - s.m[0].length)/2), y: 0 }; 
        }
        
        function collide(p, offX, offY) {
            for(let i=0; i<p.m.length; i++) 
                for(let j=0; j<p.m[0].length; j++) 
                    if(p.m[i][j]) {
                        let nx = p.x + j + offX, ny = p.y + i + offY;
                        if(nx<0 || nx>=COLS || ny>=ROWS) return true;
                        if(ny>=0 && board[ny][nx]) return true;
                    }
            return false;
        }
        
        function merge() {
            for(let i=0; i<currentPiece.m.length; i++) 
                for(let j=0; j<currentPiece.m[0].length; j++) 
                    if(currentPiece.m[i][j]) {
                        let x = currentPiece.x + j, y = currentPiece.y + i;
                        if(y>=0 && y<ROWS && x>=0 && x<COLS) board[y][x] = currentPiece.c;
                    }
            clearLines(); 
            spawn();
        }
        
        function clearLines() {
            let cleared = 0;
            for(let row=ROWS-1; row>=0; ) {
                let full = true;
                for(let col=0; col<COLS; col++) if(board[row][col]===0) { full=false; break; }
                if(full) {
                    for(let r=row; r>0; r--) board[r] = [...board[r-1]];
                    board[0] = Array(COLS).fill(0);
                    cleared++;
                } else row--;
            }
            if(cleared) { 
                score += [0,100,300,600,1000][cleared]; 
                scoreSpan.innerText = score; 
                saveHigh(); 
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); 
            }
        }
        
        function spawn() { 
            currentPiece = randomPiece(); 
            if(collide(currentPiece,0,0)) gameEnd(); 
            draw(); 
        }
        
        function move(dx, dy) { 
            if(gameOver||paused||!currentPiece) return; 
            if(!collide(currentPiece,dx,dy)) { 
                currentPiece.x+=dx; 
                currentPiece.y+=dy; 
                draw(); 
                return; 
            } 
            if(dy===1) merge(); 
        }
        
        function rotate() { 
            if(gameOver||paused||!currentPiece) return; 
            let old = currentPiece.m; 
            let rotated = old[0].map((_,i)=>old.map(r=>r[i]).reverse()); 
            currentPiece.m = rotated; 
            let off=0; 
            while(collide(currentPiece,0,0)) { 
                currentPiece.x += (off===0?-1:1); 
                if(++off>5) { 
                    currentPiece.m=old; 
                    currentPiece.x -= (off===0?-1:1); 
                    break; 
                } 
            } 
            draw(); 
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('soft'); 
        }
        
        function gameEnd() { 
            if(gameOver) return; 
            gameOver=true; 
            if(gameLoop) clearInterval(gameLoop); 
            gameLoop=null; 
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error'); 
            tg.showAlert(`Игра окончена! Счёт: ${score}`); 
        }
        
        function reset() { 
            if(gameLoop) clearInterval(gameLoop); 
            board = Array(ROWS).fill().map(()=>Array(COLS).fill(0)); 
            score=0; 
            gameOver=false; 
            paused=false; 
            pauseBtn.innerText="⏸ ПАУЗА"; 
            scoreSpan.innerText="0"; 
            currentPiece=randomPiece(); 
            if(collide(currentPiece,0,0)) { 
                board=Array(ROWS).fill().map(()=>Array(COLS).fill(0)); 
                currentPiece=randomPiece(); 
            } 
            gameLoop = setInterval(()=>{ 
                if(!gameOver && !paused && currentPiece) move(0,1); 
            }, BASE_INTERVAL); 
            draw(); 
        }
        
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for(let i=0;i<ROWS;i++) {
                for(let j=0;j<COLS;j++) { 
                    let col=board[i][j]; 
                    if(col) { 
                        ctx.fillStyle=col; 
                        ctx.fillRect(j*blockSize,i*blockSize,blockSize-0.5,blockSize-0.5); 
                    } else { 
                        ctx.fillStyle='#1f1f3a'; 
                        ctx.fillRect(j*blockSize,i*blockSize,blockSize-0.5,blockSize-0.5); 
                        ctx.fillStyle='#2a2a4a'; 
                        ctx.fillRect(j*blockSize+1,i*blockSize+1,blockSize-2.5,blockSize-2.5); 
                    } 
                }
            }
            if(currentPiece && !gameOver) {
                for(let i=0;i<currentPiece.m.length;i++) {
                    for(let j=0;j<currentPiece.m[0].length;j++) {
                        if(currentPiece.m[i][j]) {
                            ctx.fillStyle=currentPiece.c;
                            ctx.fillRect((currentPiece.x+j)*blockSize,(currentPiece.y+i)*blockSize,blockSize-0.5,blockSize-0.5);
                        }
                    }
                }
            }
            if(paused && !gameOver) {
                ctx.fillStyle='rgba(0,0,0,0.7)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle='white';
                ctx.font=`${Math.floor(blockSize*1.2)}px monospace`;
                ctx.textAlign='center';
                ctx.fillText('ПАУЗА',canvas.width/2,canvas.height/2);
            }
            ctx.beginPath();
            ctx.strokeStyle='#3d3d6b';
            ctx.lineWidth=0.5;
            for(let i=0;i<=COLS;i++) {
                ctx.moveTo(i*blockSize,0);
                ctx.lineTo(i*blockSize,canvas.height);
                ctx.stroke();
                ctx.moveTo(0,i*blockSize);
                ctx.lineTo(canvas.width,i*blockSize);
                ctx.stroke();
            }
        }
        
        function attachControls() {
            document.getElementById('leftBtn').onclick = (e) => { e.preventDefault(); move(-1,0); };
            document.getElementById('rightBtn').onclick = (e) => { e.preventDefault(); move(1,0); };
            document.getElementById('downBtn').onclick = (e) => { e.preventDefault(); move(0,1); };
            document.getElementById('newGameBtn').onclick = (e) => { e.preventDefault(); reset(); };
            document.getElementById('pauseBtn').onclick = (e) => { e.preventDefault(); togglePause(); };
            
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); rotate(); });
            canvas.addEventListener('mousedown', () => rotate());
            
            window.addEventListener('keydown', (e) => {
                let k = e.key;
                if(k === 'ArrowLeft') move(-1,0);
                else if(k === 'ArrowRight') move(1,0);
                else if(k === 'ArrowDown') move(0,1);
                else if(k === 'ArrowUp') rotate();
                else if(k === ' ' || k === 'Space') { 
                    if(!gameOver && currentPiece && !paused) { 
                        while(!collide(currentPiece,0,1)) currentPiece.y++; 
                        merge(); 
                        draw(); 
                    } 
                    e.preventDefault(); 
                }
                else if(k === 'p' || k === 'P') togglePause();
                else if(k === 'r' || k === 'R') reset();
            });
        }
        
        loadHigh(); 
        reset(); 
        attachControls(); 
        resizeCanvas();
    })();
</script>
</body>
</html>
