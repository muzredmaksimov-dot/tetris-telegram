<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тетрис — Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            touch-action: manipulation;
            padding: 6px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            width: 100%;
            height: 98vh;
            max-width: 500px;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            width: 100%;
            flex-shrink: 0;
        }

        .highscore-box {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            padding: 6px 12px;
            border-radius: 40px;
            text-align: center;
            flex: 1;
        }

        .highscore-label {
            font-size: 10px;
            color: var(--tg-theme-hint-color, #aaa);
        }

        .highscore-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--tg-theme-text-color, #fff);
        }

        .top-btn {
            background: var(--tg-theme-button-color, #2c3e66);
            border: none;
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            transition: all 0.03s linear;
            white-space: nowrap;
        }

        .new-game-btn {
            background: var(--tg-theme-destructive-text-color, #e94560);
        }

        .top-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* ИГРОВОЕ ПОЛЕ — РАСТЯГИВАЕТСЯ */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            min-height: 0;
        }

        #boardCanvas {
            display: block;
            width: auto;
            height: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background-color: #0a0a1a;
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-panel {
            width: 100%;
            flex-shrink: 0;
        }

        .score-box {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            padding: 6px 12px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 8px;
        }

        .score-label {
            font-size: 10px;
            color: var(--tg-theme-hint-color, #aaa);
        }

        .score-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--tg-theme-text-color, #fff);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .ctrl-btn {
            background: var(--tg-theme-button-color, #2c3e66);
            border: none;
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 10px 0;
            width: 75px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            transition: all 0.03s linear;
            text-align: center;
        }

        .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* МАЛЕНЬКИЕ ЭКРАНЫ */
        @media (max-width: 450px) {
            .ctrl-btn {
                width: 65px;
                font-size: 20px;
                padding: 8px 0;
            }
            .top-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
            .highscore-value, .score-value {
                font-size: 16px;
            }
        }

        @media (max-width: 380px) {
            .ctrl-btn {
                width: 55px;
                font-size: 18px;
            }
            .top-btn {
                padding: 5px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-panel">
        <div class="highscore-box">
            <div class="highscore-label">РЕКОРД</div>
            <div class="highscore-value" id="highScoreDisplay">0</div>
        </div>
        <button class="top-btn pause-btn" id="pauseBtn">⏸ ПАУЗА</button>
        <button class="top-btn new-game-btn" id="newGameBtn">🔄 НОВАЯ</button>
    </div>

    <div class="canvas-wrapper">
        <canvas id="boardCanvas"></canvas>
    </div>

    <div class="bottom-panel">
        <div class="score-box">
            <div class="score-label">СЧЁТ</div>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="leftBtn">◀</button>
            <button class="ctrl-btn" id="rightBtn">▶</button>
            <button class="ctrl-btn" id="downBtn">▼</button>
        </div>
    </div>
</div>

<script>
    (function(){
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const COLS = 10;
        const ROWS = 20;
        
        let canvas = document.getElementById('boardCanvas');
        let ctx = canvas.getContext('2d');
        let blockSize = 0;
        
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let currentPiece = null;
        let gameLoopInterval = null;
        let isGameOver = false;
        let isPaused = false;
        let currentScore = 0;
        let highScore = 0;
        
        const BASE_INTERVAL = 450;
        const STORAGE_KEY = 'tetris_highscore';
        
        const scoreSpan = document.getElementById('scoreDisplay');
        const highScoreSpan = document.getElementById('highScoreDisplay');
        const pauseBtn = document.getElementById('pauseBtn');

        const SHAPES = [
            { matrix: [[1,1,1,1]], color: '#00e5f0' },
            { matrix: [[1,1],[1,1]], color: '#f7e476' },
            { matrix: [[0,1,0],[1,1,1]], color: '#c084fc' },
            { matrix: [[0,1,1],[1,1,0]], color: '#6eeb83' },
            { matrix: [[1,1,0],[0,1,1]], color: '#fc6e6e' },
            { matrix: [[1,0,0],[1,1,1]], color: '#fca56e' },
            { matrix: [[0,0,1],[1,1,1]], color: '#6eaefc' }
        ];

        // АДАПТИВНЫЙ РАЗМЕР — поле занимает ВСЮ доступную высоту
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            const maxHeight = wrapper.clientHeight;
            const maxWidth = wrapper.clientWidth;
            
            // Поле должно быть пропорции 1:2
            const idealWidth = maxHeight / 2;
            
            if (idealWidth <= maxWidth) {
                // Ограничение по высоте
                canvas.style.height = maxHeight + 'px';
                canvas.height = maxHeight;
                canvas.style.width = (maxHeight / 2) + 'px';
                canvas.width = maxHeight / 2;
            } else {
                // Ограничение по ширине
                canvas.style.width = maxWidth + 'px';
                canvas.width = maxWidth;
                canvas.style.height = (maxWidth * 2) + 'px';
                canvas.height = maxWidth * 2;
            }
            
            blockSize = canvas.width / COLS;
            draw();
        }
        
        // Наблюдатель за изменением размера контейнера
        const resizeObserver = new ResizeObserver(() => {
            resizeCanvas();
        });
        resizeObserver.observe(canvas.parentElement);
        
        window.addEventListener('resize', () => {
            setTimeout(resizeCanvas, 10);
        });
        
        window.addEventListener('load', () => {
            setTimeout(resizeCanvas, 50);
        });
        
        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? "▶ ИГРАТЬ" : "⏸ ПАУЗА";
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            draw();
        }
        
        function loadHighScoreFromCloud() {
            tg.CloudStorage.getItem(STORAGE_KEY, (err, value) => {
                if (!err && value && !isNaN(parseInt(value))) {
                    highScore = parseInt(value);
                } else {
                    highScore = 0;
                }
                highScoreSpan.innerText = highScore;
            });
        }
        
        function saveHighScoreToCloud(score) {
            tg.CloudStorage.setItem(STORAGE_KEY, score.toString());
        }
        
        function updateHighScoreUI() {
            highScoreSpan.innerText = highScore;
        }
        
        function trySetNewHighScore(score) {
            if(score > highScore) {
                highScore = score;
                updateHighScoreUI();
                saveHighScoreToCloud(highScore);
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }
        }
        
        function randomPiece() {
            const idx = Math.floor(Math.random() * SHAPES.length);
            const shape = SHAPES[idx];
            const matrixCopy = shape.matrix.map(row => [...row]);
            return {
                matrix: matrixCopy,
                color: shape.color,
                x: Math.floor((COLS - matrixCopy[0].length) / 2),
                y: 0
            };
        }
        
        function collide(piece, board, offX = 0, offY = 0) {
            for(let row = 0; row < piece.matrix.length; row++) {
                for(let col = 0; col < piece.matrix[0].length; col++) {
                    if(piece.matrix[row][col] !== 0) {
                        const boardX = piece.x + col + offX;
                        const boardY = piece.y + row + offY;
                        if(boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                        if(boardY >= 0 && board[boardY][boardX] !== 0) return true;
                    }
                }
            }
            return false;
        }
        
        function mergePiece() {
            for(let row = 0; row < currentPiece.matrix.length; row++) {
                for(let col = 0; col < currentPiece.matrix[0].length; col++) {
                    if(currentPiece.matrix[row][col] !== 0) {
                        const boardX = currentPiece.x + col;
                        const boardY = currentPiece.y + row;
                        if(boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
            clearLines();
            spawnNewPiece();
        }
        
        function clearLines() {
            let linesCleared = 0;
            for(let row = ROWS-1; row >= 0; ) {
                let full = true;
                for(let col = 0; col < COLS; col++) {
                    if(board[row][col] === 0) {
                        full = false;
                        break;
                    }
                }
                if(full) {
                    for(let r = row; r > 0; r--) {
                        board[r] = [...board[r-1]];
                    }
                    board[0] = Array(COLS).fill(0);
                    linesCleared++;
                } else {
                    row--;
                }
            }
            
            if(linesCleared > 0) {
                const addScore = linesCleared === 1 ? 100 : linesCleared === 2 ? 300 : linesCleared === 3 ? 600 : 1000;
                currentScore += addScore;
                scoreSpan.innerText = currentScore;
                trySetNewHighScore(currentScore);
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }
        
        function spawnNewPiece() {
            currentPiece = randomPiece();
            if(collide(currentPiece, board, 0, 0)) {
                gameOver();
            }
            draw();
        }
        
        function movePiece(dx, dy) {
            if(isGameOver || isPaused || !currentPiece) return false;
            if(!collide(currentPiece, board, dx, dy)) {
                currentPiece.x += dx;
                currentPiece.y += dy;
                draw();
                return true;
            }
            if(dy === 1) {
                mergePiece();
                draw();
            }
            return false;
        }
        
        function rotatePiece() {
            if(isGameOver || isPaused || !currentPiece) return;
            const oldMatrix = currentPiece.matrix;
            const rotated = oldMatrix[0].map((_, idx) => oldMatrix.map(row => row[idx]).reverse());
            const oldPiece = {
                matrix: currentPiece.matrix,
                color: currentPiece.color,
                x: currentPiece.x,
                y: currentPiece.y
            };
            currentPiece.matrix = rotated;
            let offset = 0;
            while(collide(currentPiece, board, 0, 0)) {
                currentPiece.x += (offset === 0 ? -1 : 1);
                if(Math.abs(offset) > 5) {
                    currentPiece.matrix = oldMatrix;
                    currentPiece.x = oldPiece.x;
                    return;
                }
                offset++;
            }
            draw();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('soft');
        }
        
        function gameOver() {
            if(isGameOver) return;
            isGameOver = true;
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = null;
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            tg.showAlert(`Игра окончена! Ваш счёт: ${currentScore}`);
        }
        
        function resetGame() {
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            currentScore = 0;
            isGameOver = false;
            isPaused = false;
            pauseBtn.innerText = "⏸ ПАУЗА";
            scoreSpan.innerText = "0";
            currentPiece = randomPiece();
            if(collide(currentPiece, board, 0, 0)) {
                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                currentPiece = randomPiece();
            }
            gameLoopInterval = setInterval(() => {
                if(!isGameOver && !isPaused && currentPiece) {
                    movePiece(0, 1);
                }
            }, BASE_INTERVAL);
            draw();
        }
        
        function draw() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for(let row = 0; row < ROWS; row++) {
                for(let col = 0; col < COLS; col++) {
                    const color = board[row][col];
                    if(color !== 0) {
                        ctx.fillStyle = color;
                        ctx.fillRect(col * blockSize, row * blockSize, blockSize - 0.5, blockSize - 0.5);
                    } else {
                        ctx.fillStyle = '#1f1f3a';
                        ctx.fillRect(col * blockSize, row * blockSize, blockSize - 0.5, blockSize - 0.5);
                        ctx.fillStyle = '#2a2a4a';
                        ctx.fillRect(col * blockSize + 1, row * blockSize + 1, blockSize - 2.5, blockSize - 2.5);
                    }
                }
            }
            
            if(currentPiece && !isGameOver) {
                for(let row = 0; row < currentPiece.matrix.length; row++) {
                    for(let col = 0; col < currentPiece.matrix[0].length; col++) {
                        if(currentPiece.matrix[row][col]) {
                            ctx.fillStyle = currentPiece.color;
                            const x = (currentPiece.x + col) * blockSize;
                            const y = (currentPiece.y + row) * blockSize;
                            ctx.fillRect(x, y, blockSize - 0.5, blockSize - 0.5);
                        }
                    }
                }
            }
            
            if(isPaused && !isGameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = `${Math.floor(blockSize * 1.2)}px monospace`;
                ctx.textAlign = 'center';
                ctx.fillText('ПАУЗА', canvas.width/2, canvas.height/2);
            }
            
            ctx.beginPath();
            ctx.strokeStyle = '#3d3d6b';
            ctx.lineWidth = 0.5;
            for(let i = 0; i <= COLS; i++) {
                ctx.moveTo(i * blockSize, 0);
                ctx.lineTo(i * blockSize, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * blockSize);
                ctx.lineTo(canvas.width, i * blockSize);
                ctx.stroke();
            }
        }
        
        function attachControls() {
            document.getElementById('leftBtn').onclick = (e) => { e.preventDefault(); movePiece(-1,0); };
            document.getElementById('rightBtn').onclick = (e) => { e.preventDefault(); movePiece(1,0); };
            document.getElementById('downBtn').onclick = (e) => { e.preventDefault(); movePiece(0,1); };
            document.getElementById('newGameBtn').onclick = (e) => { e.preventDefault(); resetGame(); };
            document.getElementById('pauseBtn').onclick = (e) => { e.preventDefault(); togglePause(); };
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                rotatePiece();
            });
            canvas.addEventListener('mousedown', (e) => {
                rotatePiece();
            });
            
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if(key === 'ArrowLeft') { movePiece(-1,0); e.preventDefault();}
                else if(key === 'ArrowRight') { movePiece(1,0); e.preventDefault();}
                else if(key === 'ArrowDown') { movePiece(0,1); e.preventDefault();}
                else if(key === 'ArrowUp') { rotatePiece(); e.preventDefault();}
                else if(key === ' ' || key === 'Space') { 
                    if(!isGameOver && currentPiece && !isPaused) {
                        while(!collide(currentPiece, board, 0, 1)) { currentPiece.y++; }
                        mergePiece();
                        draw();
                    }
                    e.preventDefault();
                }
                else if(key === 'p' || key === 'P') { togglePause(); e.preventDefault();}
                else if(key === 'r' || key === 'R') { resetGame(); e.preventDefault();}
            });
        }
        
        function init() {
            loadHighScoreFromCloud();
            resetGame();
            attachControls();
            resizeCanvas();
            document.body.style.backgroundColor = 'var(--tg-theme-bg-color)';
        }
        
        init();
    })();
</script>
</body>
</html>
